<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Legends of Aetheria</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:#000;
}

canvas{
display:block;
width:100vw;
height:100vh;
touch-action:none;
}

#titleScreen{
position:fixed;
inset:0;
background:linear-gradient(#1d3557,#2a9d8f);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:1000;
}

#gameTitle{
font-size:48px;
font-weight:bold;
color:white;
text-align:center;
margin-bottom:20px;
}

#gameSubtitle{
font-size:20px;
color:white;
margin-bottom:40px;
}

.menuBtn{
width:260px;
padding:15px;
margin:10px;
border:none;
border-radius:12px;
font-size:22px;
background:white;
}

#creator{
position:fixed;
inset:0;
background:#111;
color:white;
display:none;
z-index:900;
overflow:auto;
padding:20px;
}

.creatorTitle{
font-size:32px;
margin-bottom:20px;
}

.creatorLabel{
margin-top:15px;
margin-bottom:5px;
font-size:18px;
}

.creatorInput{
width:100%;
padding:12px;
font-size:18px;
border-radius:8px;
border:none;
}

.colorRow{
display:flex;
gap:10px;
margin-top:10px;
flex-wrap:wrap;
}

.colorBtn{
width:50px;
height:50px;
border-radius:50%;
border:3px solid white;
}

#gameUI{
display:none;
}

#topBar{
position:fixed;
top:10px;
left:10px;
right:10px;
display:flex;
justify-content:space-between;
pointer-events:none;
z-index:100;
}

.panel{
background:rgba(0,0,0,.7);
color:white;
padding:10px;
border-radius:12px;
}

#questBox{
position:fixed;
top:90px;
left:10px;
background:rgba(0,0,0,.7);
color:white;
padding:10px;
border-radius:12px;
z-index:100;
}

#joy{
position:fixed;
left:20px;
bottom:20px;
width:120px;
height:120px;
border-radius:50%;
background:rgba(255,255,255,.15);
display:none;
z-index:100;
}

#stick{
position:absolute;
left:40px;
top:40px;
width:40px;
height:40px;
border-radius:50%;
background:white;
}

#interactBtn{
position:fixed;
right:20px;
bottom:40px;
width:90px;
height:90px;
border:none;
border-radius:50%;
font-size:24px;
background:#ffb703;
display:none;
z-index:100;
}

#menuBtn{
position:fixed;
right:20px;
bottom:150px;
width:90px;
height:90px;
border:none;
border-radius:50%;
font-size:20px;
background:#219ebc;
display:none;
z-index:100;
}

#dialog{
position:fixed;
left:50%;
bottom:20px;
transform:translateX(-50%);
width:90%;
max-width:700px;
background:rgba(0,0,0,.85);
color:white;
padding:15px;
border-radius:12px;
display:none;
z-index:150;
}

</style>
</head>
<body>

<div id="titleScreen">

<div id="gameTitle">
LEGENDS OF AETHERIA
</div>

<div id="gameSubtitle">
A Monster Catching Adventure
</div>

<button class="menuBtn" id="newGameBtn">
New Game
</button>

<button class="menuBtn" id="continueBtn">
Continue
</button>

</div>

<div id="creator">

<div class="creatorTitle">
Create Your Trainer
</div>
<canvas
id="previewCanvas"
width="140"
height="180"
style="
display:block;
margin:auto;
background:#222;
border-radius:12px;
margin-bottom:20px;
">
</canvas>
<div class="creatorLabel">
Trainer Name
</div>

<input
id="playerName"
class="creatorInput"
value="Trainer"
>

<div class="creatorLabel">
Hair Color
</div>

<div class="colorRow">

<button class="colorBtn" data-hair="#000000" style="background:#000000"></button>

<button class="colorBtn" data-hair="#5a3825" style="background:#5a3825"></button>

<button class="colorBtn" data-hair="#c68642" style="background:#c68642"></button>

<button class="colorBtn" data-hair="#ffffff" style="background:#ffffff"></button>

</div>
<div class="creatorLabel">
Skin Tone
</div>

<div class="colorRow">

<button class="colorBtn" data-skin="#f2d2b6" style="background:#f2d2b6"></button>

<button class="colorBtn" data-skin="#d8a47f" style="background:#d8a47f"></button>

<button class="colorBtn" data-skin="#b97a57" style="background:#b97a57"></button>

<button class="colorBtn" data-skin="#8d5524" style="background:#8d5524"></button>

</div>

<div class="creatorLabel">
Shirt Color
</div>

<div class="colorRow">

<button class="colorBtn" data-shirt="#cc0000" style="background:#cc0000"></button>

<button class="colorBtn" data-shirt="#0066cc" style="background:#0066cc"></button>

<button class="colorBtn" data-shirt="#22aa22" style="background:#22aa22"></button>

<button class="colorBtn" data-shirt="#8844cc" style="background:#8844cc"></button>

</div>

<div class="creatorLabel">
Pants Color
</div>

<div class="colorRow">

<button class="colorBtn" data-pants="#222222" style="background:#222222"></button>

<button class="colorBtn" data-pants="#444444" style="background:#444444"></button>

<button class="colorBtn" data-pants="#1a3d7c" style="background:#1a3d7c"></button>

<button class="colorBtn" data-pants="#5a3825" style="background:#5a3825"></button>

</div>

<br><br>

<button class="menuBtn" id="startAdventureBtn">
Start Adventure
</button>

</div>

<div id="gameUI">

<div id="topBar">

<div class="panel">
<span id="moneyText">₳1000</span>
</div>

<div class="panel">
<span id="orbText">Nova Orbs: 5</span>
</div>

</div>

<div id="questBox">
Objective: Visit Professor Cedar
</div>

</div>

<canvas id="game"></canvas>

<div id="dialog"></div>

<div id="joy">
<div id="stick"></div>
</div>

<button id="interactBtn">
Talk
</button>

<button id="menuBtn">
Menu
</button>

<script>

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
const grassImg = new Image();
grassImg.src = "assets/grass.png";

const treeImages=[];
const houseImg = new Image();
houseImg.src = "assets/house.png";
const pathImg = new Image();
pathImg.src = "assets/path1.png";
for(let i=1;i<=3;i++){

const img=new Image();

img.src="assets/tree"+i+".png";

treeImages.push(img);

}

function resize(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
}

resize();
window.addEventListener("resize",resize);

const titleScreen=document.getElementById("titleScreen");
const creator=document.getElementById("creator");
const gameUI=document.getElementById("gameUI");

const newGameBtn=document.getElementById("newGameBtn");
const startAdventureBtn=document.getElementById("startAdventureBtn");
const continueBtn=document.getElementById("continueBtn");

const dialog=document.getElementById("dialog");

let gameStarted=false;


const saveData={
  name:"Trainer",
  hair:"#000000",
  skin:"#f2d2b6",
  shirt:"#cc0000",
  pants:"#222222",
  money:1000,
  orbs:5,
  quest:"Visit Professor Cedar",
  x:500,
  y:500
};

const previewCanvas =
document.getElementById("previewCanvas");

const previewCtx =
previewCanvas.getContext("2d");

function drawPreview(){

  previewCtx.clearRect(
    0,0,
    previewCanvas.width,
    previewCanvas.height
  );

  const x=55;
  const y=40;

  previewCtx.fillStyle=saveData.skin;
  previewCtx.beginPath();
  previewCtx.arc(x+15,y+15,18,0,Math.PI*2);
  previewCtx.fill();

  previewCtx.fillStyle=saveData.hair;
  previewCtx.beginPath();
  previewCtx.arc(x+15,y+10,18,Math.PI,0);
  previewCtx.fill();

  previewCtx.fillStyle=saveData.shirt;
  previewCtx.fillRect(x,y+32,30,40);

  previewCtx.fillStyle=saveData.skin;
  previewCtx.fillRect(x-8,y+35,8,28);
  previewCtx.fillRect(x+30,y+35,8,28);

  previewCtx.fillStyle=saveData.pants;
  previewCtx.fillRect(x+2,y+72,12,30);
  previewCtx.fillRect(x+16,y+72,12,30);

  previewCtx.fillStyle="black";
  previewCtx.fillRect(x,y+102,14,6);
  previewCtx.fillRect(x+16,y+102,14,6);
}

newGameBtn.onclick=()=>{

titleScreen.style.display="none";
creator.style.display="block";

drawPreview();

};
startAdventureBtn.onclick=()=>{

saveData.name=
document.getElementById("playerName").value || "Trainer";

document.getElementById("moneyText").innerText=
"₳"+saveData.money;

document.getElementById("orbText").innerText=
"Nova Orbs: "+saveData.orbs;

creator.style.display="none";

gameUI.style.display="block";

document.getElementById("joy").style.display="block";
document.getElementById("interactBtn").style.display="block";
document.getElementById("menuBtn").style.display="block";

gameStarted=true;

localStorage.setItem(
"aetheriaSave",
JSON.stringify(saveData)
);

showDialog(
"Mom: Professor Cedar is looking for you!"
);
};
continueBtn.onclick=()=>{

const save =
localStorage.getItem("aetheriaSave");

if(!save){

showDialog("No save file found.");
return;

}

Object.assign(
saveData,
JSON.parse(save)
);

player.x = saveData.x;
player.y = saveData.y;

titleScreen.style.display="none";
gameUI.style.display="block";

document.getElementById("joy").style.display="block";
document.getElementById("interactBtn").style.display="block";
document.getElementById("menuBtn").style.display="block";

document.getElementById("moneyText").innerText=
"₳"+saveData.money;

document.getElementById("orbText").innerText=
"Nova Orbs: "+saveData.orbs;

gameStarted=true;

showDialog(
"Welcome back, "+saveData.name+"!"
);

};

document.querySelectorAll("[data-hair]").forEach(btn=>{

btn.onclick=()=>{

saveData.hair=
btn.dataset.hair;

drawPreview();

};

});
document.querySelectorAll("[data-skin]").forEach(btn=>{

btn.onclick=()=>{

saveData.skin=
btn.dataset.skin;

drawPreview();

};

});

drawPreview();

document.querySelectorAll("[data-shirt]").forEach(btn=>{

btn.onclick=()=>{

saveData.shirt=
btn.dataset.shirt;

drawPreview();

};

});

document.querySelectorAll("[data-pants]").forEach(btn=>{

btn.onclick=()=>{

saveData.pants=
btn.dataset.pants;

drawPreview();

};

});

function showDialog(text){

dialog.innerText=text;

dialog.style.display="block";

setTimeout(()=>{

dialog.style.display="none";

},3500);

}

const player={

x:500,
y:500,

w:34,
h:50,

speed:3

};

const pyrox={

x:450,
y:540,

flameFrame:0

};

const camera={

x:0,
y:0

};

const houses=[

{
x:700,
y:350,
w:220,
h:160,
name:"Professor Cedar Lab"
},

{
x:250,
y:650,
w:200,
h:140,
name:"Your House"
},

{
x:1000,
y:350,
w:200,
h:140,
name:"Item Shop"
},

{
x:1000,
y:600,
w:200,
h:140,
name:"Aether Center"
}

];

const npcs=[

{
x:500,
y:700,
text:"Oakwind Village is peaceful."
},

{
x:840,
y:560,
text:"Professor Cedar studies Aetherons."
}

];

const trees=[];

for(let i=0;i<120;i++){

trees.push({

x:Math.random()*3500,
y:Math.random()*2500

});

}

let moveX=0;
let moveY=0;
function interact(){

for(let npc of npcs){

const dx=player.x-npc.x;
const dy=player.y-npc.y;

const dist=Math.sqrt(dx*dx+dy*dy);

if(dist<90){

showDialog(npc.text);
return;

}

}

for(let house of houses){

const cx=house.x+house.w/2;
const cy=house.y+house.h/2;

const dx=player.x-cx;
const dy=player.y-cy;

const dist=Math.sqrt(dx*dx+dy*dy);

if(dist<170){

if(house.name==="Professor Cedar Lab"){

showDialog(
"Professor Cedar: Take care of Pyrox. Your journey starts now!"
);

document.getElementById("questBox").innerText=
"Objective: Travel east to Verdant Forest";

}else{

showDialog(
"You are home."
);

}

return;

}

}

}

document.getElementById("interactBtn").onclick=
interact;

function update(){

if(!gameStarted)return;
player.x += moveX;
player.y += moveY;

saveData.x = player.x;
saveData.y = player.y;

localStorage.setItem(
"aetheriaSave",
JSON.stringify(saveData)
);
camera.x=
player.x-canvas.width/2;

camera.y=
player.y-canvas.height/2;

if(player.x<0)player.x=0;
if(player.y<0)player.y=0;

if(player.x>4000)player.x=4000;
if(player.y>3000)player.y=3000;

pyrox.x+=
((player.x-50)-pyrox.x)*0.08;

pyrox.y+=
((player.y+40)-pyrox.y)*0.08;

pyrox.flameFrame+=0.15;
checkWildEncounter();
}

function drawTrees(){

for(let tree of trees){

const x=tree.x-camera.x;
const y=tree.y-camera.y;

const img =
treeImages[Math.floor(tree.x % treeImages.length)];

ctx.drawImage(
img,
x-64,
y-128,
128,
128
);

}

}

function drawHouses(){

for(let house of houses){

ctx.drawImage(
houseImg,
house.x - camera.x,
house.y - camera.y - 80,
220,
220
);

ctx.fillStyle="black";

ctx.fillStyle = "white";

ctx.fillText(
house.name,
house.x - camera.x + 20,
house.y - camera.y + 150
);

}

}
function drawPyrox(){

const px=pyrox.x-camera.x;
const py=pyrox.y-camera.y;

const flame=
8+Math.sin(pyrox.flameFrame)*3;

// tail flame
ctx.fillStyle="orange";
ctx.beginPath();
ctx.arc(px-20,py+2,flame,0,Math.PI*2);
ctx.fill();

ctx.fillStyle="yellow";
ctx.beginPath();
ctx.arc(px-20,py+2,flame/2,0,Math.PI*2);
ctx.fill();

// body
ctx.fillStyle="#ff8c1a";
ctx.beginPath();
ctx.ellipse(px,py,22,14,0,0,Math.PI*2);
ctx.fill();

// belly
ctx.fillStyle="#ffe5b4";
ctx.beginPath();
ctx.ellipse(px+2,py+2,10,7,0,0,Math.PI*2);
ctx.fill();

// head
ctx.fillStyle="#ff8c1a";
ctx.beginPath();
ctx.arc(px+16,py-10,12,0,Math.PI*2);
ctx.fill();

// eye
ctx.fillStyle="white";
ctx.beginPath();
ctx.arc(px+20,py-13,3,0,Math.PI*2);
ctx.fill();

ctx.fillStyle="black";
ctx.beginPath();
ctx.arc(px+20,py-13,1.5,0,Math.PI*2);
ctx.fill();

// legs
ctx.fillStyle="#cc6600";
ctx.fillRect(px-10,py+8,5,8);
ctx.fillRect(px+4,py+8,5,8);

// name
ctx.fillStyle="white";
ctx.font="16px Arial";
ctx.fillText("Pyrox",px-18,py-24);

}
function drawNPCs(){

for(let npc of npcs){

const x=npc.x-camera.x;
const y=npc.y-camera.y;

// shadow
ctx.fillStyle="rgba(0,0,0,0.25)";
ctx.beginPath();
ctx.ellipse(x+14,y+44,10,4,0,0,Math.PI*2);
ctx.fill();

// head
ctx.fillStyle="#f2d2b6";
ctx.beginPath();
ctx.arc(x+14,y+10,8,0,Math.PI*2);
ctx.fill();

// hair
ctx.fillStyle="#4a2c1d";
ctx.beginPath();
ctx.arc(x+14,y+8,8,Math.PI,0);
ctx.fill();

// body
ctx.fillStyle="#2266ff";
ctx.fillRect(x+6,y+18,16,18);

// arms
ctx.fillStyle="#f2d2b6";
ctx.fillRect(x+3,y+20,3,10);
ctx.fillRect(x+22,y+20,3,10);

// legs
ctx.fillStyle="#222";
ctx.fillRect(x+8,y+36,5,10);
ctx.fillRect(x+15,y+36,5,10);

}

}
function drawPlayer(){

const px=player.x-camera.x;
const py=player.y-camera.y;

// shadow
ctx.fillStyle="rgba(0,0,0,0.25)";
ctx.beginPath();
ctx.ellipse(px+17,py+52,12,5,0,0,Math.PI*2);
ctx.fill();

// head
ctx.fillStyle=saveData.skin;
ctx.beginPath();
ctx.arc(px+17,py+12,10,0,Math.PI*2);
ctx.fill();

// eyes
ctx.fillStyle="black";
ctx.fillRect(px+13,py+10,2,2);
ctx.fillRect(px+19,py+10,2,2);
// hair
ctx.fillStyle=saveData.hair;
ctx.beginPath();
ctx.arc(px+17,py+9,10,Math.PI,0);
ctx.fill();

// shirt
ctx.fillStyle=saveData.shirt;
ctx.fillRect(px+7,py+20,20,16);

// arms
ctx.fillStyle=saveData.skin;
ctx.fillRect(px+4,py+22,3,12);
ctx.fillRect(px+27,py+22,3,12);

// legs
ctx.fillStyle=saveData.pants;
ctx.fillRect(px+9,py+36,7,14);
ctx.fillRect(px+18,py+36,7,14);

// shoes
ctx.fillStyle="black";
ctx.fillRect(px+8,py+48,8,3);
ctx.fillRect(px+18,py+48,8,3);

// name
ctx.fillStyle="white";
ctx.font="20px Arial";
ctx.fillText(saveData.name,px-15,py-12);

}


const grassPatches=[

{
x:600,
y:450,
w:250,
h:200
},

{
x:900,
y:500,
w:300,
h:250
},

{
x:1300,
y:550,
w:400,
h:300
},

{
x:1850,
y:800,
w:400,
h:300
}

];

let encounterCooldown=0;

const wildAetherons=[

"Leaflet",
"Twigowl",
"Mosscub",
"Budfinch",
"Floroot"

];

function drawGrass(){

for(let g of grassPatches){

ctx.drawImage(
grassImg,
g.x-camera.x,
g.y-camera.y,
g.w,
g.h
);

}

}

function checkWildEncounter(){

if(encounterCooldown>0){

encounterCooldown--;
return;

}

for(let g of grassPatches){

if(
player.x>g.x &&
player.x<g.x+g.w &&
player.y>g.y &&
player.y<g.y+g.h
){

if(Math.random()<0.003){

encounterCooldown=300;
startWildBattle();

}

}

}

}

function startWildBattle(){

const wildName=
wildAetherons[
Math.floor(
Math.random()*wildAetherons.length
)
];

showDialog(
"Wild "+wildName+" appeared!"
);

}

function drawWorld(){

for(let x=0;x<5000;x+=128){

for(let y=0;y<4000;y+=128){

ctx.drawImage(
grassImg,
x-camera.x,
y-camera.y,
128,
128
);

}

}


ctx.drawImage(
pathImg,
0-camera.x,
450-camera.y,
700,
40
);

ctx.drawImage(
pathImg,
330-camera.x,
250-camera.y,
40,
300
);
ctx.fillStyle="#8b5a2b";

for(let i=0;i<15;i++){

ctx.fillRect(
100+i*60-camera.x,
200-camera.y,
8,
40
);

}
drawTrees();
drawGrass();
drawHouses();
drawNPCs();
drawPyrox();
drawPlayer();
ctx.fillStyle="#3a86ff";

ctx.beginPath();

ctx.arc(
1600-camera.x,
700-camera.y,
180,
0,
Math.PI*2
);

ctx.fill();
}

function render(){

ctx.clearRect(
0,
0,
canvas.width,
canvas.height
);

if(!gameStarted){
return;
}

drawWorld();

ctx.fillStyle="white";
ctx.font="20px Arial";

ctx.fillText(
"Oakwind Village",
20,
canvas.height-20
);

}

const joy=document.getElementById("joy");
const stick=document.getElementById("stick");

joy.addEventListener("touchstart",e=>{
e.preventDefault();
});

joy.addEventListener("touchmove",e=>{

e.preventDefault();

const rect=
joy.getBoundingClientRect();

const touch=
e.touches[0];

let x=
touch.clientX-rect.left-60;

let y=
touch.clientY-rect.top-60;

const dist=
Math.sqrt(x*x+y*y);

if(dist>40){

x=x/dist*40;
y=y/dist*40;

}

stick.style.left=
(x+40)+"px";

stick.style.top=
(y+40)+"px";

moveX=x/10;
moveY=y/10;

});

joy.addEventListener("touchend",()=>{

moveX=0;
moveY=0;

stick.style.left="40px";
stick.style.top="40px";

});

function loop(){

update();
render();

requestAnimationFrame(loop);

}

loop();

window.addEventListener(
"touchmove",
e=>{
if(gameStarted){
e.preventDefault();
}
},
{passive:false}
);

/*
window.addEventListener(
"touchstart",
e=>{
e.preventDefault();
},
{passive:false}
);

window.addEventListener(
"touchmove",
e=>{
if(gameStarted){
e.preventDefault();
}
},
{passive:false}
);
*/ 
document.getElementById("moneyText").innerText=
"₳"+saveData.money;

document.getElementById("orbText").innerText=
"Nova Orbs: "+saveData.orbs;

showDialog(
"Welcome to Aetheria, "+saveData.name+"!"
);

setTimeout(()=>{

showDialog(
"Objective: Visit Professor Cedar"
);

},4000);

document.getElementById("menuBtn").onclick=()=>{

showDialog(
"Menu system coming in Update 3"
);

};

ctx.imageSmoothingEnabled=true;
drawPreview();
</script>

</body>
</html>
