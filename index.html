<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Legends of Aetheria</title>
<style>
html,body{
margin:0;
padding:0;
overflow:hidden;
background:#000;
font-family:Arial,sans-serif;
}
canvas{
display:block;
width:100vw;
height:100vh;
touch-action:none;
}
#ui{
position:fixed;
left:0;
bottom:0;
width:100%;
pointer-events:none;
}
#dialogue{
display:none;
margin:20px;
padding:15px;
border-radius:12px;
background:rgba(0,0,0,.85);
color:white;
font-size:18px;
}
#joystick{
position:fixed;
left:20px;
bottom:20px;
width:120px;
height:120px;
border-radius:50%;
background:rgba(255,255,255,.15);
}
#stick{
position:absolute;
left:40px;
top:40px;
width:40px;
height:40px;
border-radius:50%;
background:white;
}
</style>
</head>
<body>
<div id="ui">
<div id="dialogue"></div>
</div>
<div id="joystick">
<div id="stick"></div>
</div>
<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
function resize(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
}
resize();
window.addEventListener("resize",resize);
const dialogue=document.getElementById("dialogue");
const player={
x:400,
y:300,
size:32,
speed:3
};
const camera={
x:0,
y:0
};
const keys={};
window.addEventListener("keydown",e=>{
keys[e.key.toLowerCase()]=true;
if(e.key==="e"){
interact();
}
});
window.addEventListener("keyup",e=>{
keys[e.key.toLowerCase()]=false;
});
const buildings=[
{
x:700,
y:350,
w:180,
h:140,
name:"Professor Cedar Lab"
}
];
const npcs=[
{
x:520,
y:420,
text:"Welcome to Oakwind Village!"
},
{
x:780,
y:520,
text:"Professor Cedar is waiting for you."
}
];
const trees=[];
for(let i=0;i<60;i++){
trees.push({
x:Math.random()*2500,
y:Math.random()*1800
});
}
function showDialogue(text){
dialogue.innerText=text;
dialogue.style.display="block";
setTimeout(()=>{
dialogue.style.display="none";
},3000);
}
function interact(){
for(let npc of npcs){
const dx=player.x-npc.x;
const dy=player.y-npc.y;
const dist=Math.sqrt(dx*dx+dy*dy);
if(dist<80){
showDialogue(npc.text);
return;
}
}
for(let b of buildings){
const dx=player.x-(b.x+b.w/2);
const dy=player.y-(b.y+b.h/2);
const dist=Math.sqrt(dx*dx+dy*dy);
if(dist<150){
showDialogue("You entered "+b.name);
return;
}
}
}
function update(){
let speed=player.speed;
if(keys["shift"]){
speed=6;
}
if(keys["w"]) player.y-=speed;
if(keys["s"]) player.y+=speed;
if(keys["a"]) player.x-=speed;
if(keys["d"]) player.x+=speed;
camera.x=player.x-canvas.width/2;
camera.y=player.y-canvas.height/2;
}
function drawWorld(){
ctx.fillStyle="#4da64d";
ctx.fillRect(0,0,3000,2000);
for(let t of trees){
ctx.fillStyle="#145214";
ctx.beginPath();
ctx.arc(
t.x-camera.x,
t.y-camera.y,
25,
0,
Math.PI*2
);
ctx.fill();
}
for(let b of buildings){
ctx.fillStyle="#c28c52";
ctx.fillRect(
b.x-camera.x,
b.y-camera.y,
b.w,
b.h
);
ctx.fillStyle="black";
ctx.fillText(
b.name,
b.x-camera.x+10,
b.y-camera.y+20
);
}
for(let npc of npcs){
ctx.fillStyle="blue";
ctx.fillRect(
npc.x-camera.x,
npc.y-camera.y,
28,
28
);
}
}
function drawPlayer(){
ctx.fillStyle="#ff5533";
ctx.fillRect(
player.x-camera.x,
player.y-camera.y,
player.size,
player.size
);
ctx.fillStyle="white";
ctx.fillText(
"Pyrox Trainer",
player.x-camera.x-15,
player.y-camera.y-10
);
}
function render(){
ctx.clearRect(0,0,canvas.width,canvas.height);
drawWorld();
drawPlayer();
ctx.fillStyle="white";
ctx.font="20px Arial";
ctx.fillText(
"Oakwind Village",
20,
30
);
ctx.fillText(
"Press E to interact",
20,
60
);
}
function loop(){
update();
render();
requestAnimationFrame(loop);
}
loop();
let joy=document.getElementById("joystick");
let stick=document.getElementById("stick");
let active=false;
joy.addEventListener("touchstart",()=>{
active=true;
});
joy.addEventListener("touchend",()=>{
active=false;
stick.style.left="40px";
stick.style.top="40px";
});
joy.addEventListener("touchmove",(e)=>{
if(!active)return;
const rect=joy.getBoundingClientRect();
const touch=e.touches[0];
const x=touch.clientX-rect.left-60;
const y=touch.clientY-rect.top-60;
stick.style.left=(x+40)+"px";
stick.style.top=(y+40)+"px";
player.x+=x*0.05;
player.y+=y*0.05;
});
</script>
</body>
</html>
